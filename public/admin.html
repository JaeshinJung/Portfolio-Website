<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard — Manage portfolio content.">
    <title>Admin | Jaeshin Jung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars" id="stars-bg"></div>

    <!-- ============================== -->
    <!-- LOGIN SCREEN                   -->
    <!-- ============================== -->
    <div id="login-view" class="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="email" id="login-email" class="pixel-input" placeholder="Email">
            <input type="password" id="login-password" class="pixel-input" placeholder="Password">
            <button id="login-btn" class="pixel-btn" style="width:100%;">LOGIN</button>
            <p id="login-error" class="login-error"></p>
        </div>
    </div>

    <!-- ============================== -->
    <!-- DASHBOARD (hidden until login) -->
    <!-- ============================== -->
    <div id="dashboard-view" style="display:none;">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills-awards.html">Skills</a></li>
                <li><a href="admin.html" class="active">Admin</a></li>
            </ul>
        </nav>

        <div class="admin-dashboard">
            <div class="admin-header">
                <h1>&#9881; Dashboard</h1>
                <div>
                    <span id="user-email" class="admin-user-info"></span>
                    <button id="logout-btn" class="pixel-btn danger" style="margin-left:12px;font-size:8px;padding:10px 16px;">Logout</button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="home-tab">Home</button>
                <button class="tab-btn" data-tab="projects-tab">Projects</button>
                <button class="tab-btn" data-tab="experiences-tab">Experience</button>
                <button class="tab-btn" data-tab="skills-tab">Skills</button>
            </div>

            <!-- ===== HOME TAB ===== -->
            <div id="home-tab" class="tab-content active">
                <div class="admin-form">
                    <h3>✎ Edit Home Page</h3>
                    <div class="form-group">
                        <label>Hero Title</label>
                        <input type="text" id="home-hero-title" class="pixel-input" placeholder="Jaeshin Jung">
                    </div>
                    <div class="form-group">
                        <label>Hero Subtitle</label>
                        <input type="text" id="home-hero-subtitle" class="pixel-input" placeholder="Computer Science @ Texas A&M...">
                    </div>
                    <div class="form-group">
                        <label>Profile Image URL</label>
                        <input type="text" id="home-profile-img" class="pixel-input" placeholder="assets/avatar.png">
                    </div>
                    <div class="form-group">
                        <label>About Me</label>
                        <textarea id="home-about-me" class="pixel-input" rows="5" placeholder="Computer Science major..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button id="home-save-btn" class="pixel-btn">Save Home Content</button>
                    </div>
                </div>
            </div>

            <!-- ===== PROJECTS TAB ===== -->
            <div id="projects-tab" class="tab-content">
                <div class="admin-form">
                    <h3 id="project-form-title">+ Add Project</h3>
                    <input type="hidden" id="project-edit-id">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="proj-title" class="pixel-input" placeholder="Project Name">
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" id="proj-image" class="pixel-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label class="pixel-checkbox-label">
                            <input type="checkbox" id="proj-is-public" checked>
                            <span class="pixel-checkbox-box"></span>
                            Enable Public Repository?
                        </label>
                    </div>
                    <div class="form-group" id="proj-repo-container">
                        <label>Repository URL</label>
                        <input type="text" id="proj-repo" class="pixel-input" placeholder="https://github.com/...">
                    </div>
                    <div class="form-group" id="proj-private-container" style="display:none;">
                        <label>Private Message</label>
                        <input type="text" id="proj-private-msg" class="pixel-input" value="Due to security regulations, the code is kept confidential.">
                    </div>
                    <div class="form-group">
                        <label>Demo URL (optional)</label>
                        <input type="text" id="proj-demo" class="pixel-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="proj-desc" class="pixel-input" placeholder="Brief description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Order (number for sorting)</label>
                        <input type="number" id="proj-order" class="pixel-input" placeholder="0" value="0">
                    </div>
                    <div class="form-actions">
                        <button id="proj-save-btn" class="pixel-btn">Save</button>
                        <button id="proj-cancel-btn" class="pixel-btn secondary" style="display:none;">Cancel</button>
                    </div>
                </div>
                <h3 class="admin-section-title">Existing Projects</h3>
                <div id="proj-list"></div>
            </div>

            <!-- ===== EXPERIENCE TAB ===== -->
            <div id="experiences-tab" class="tab-content">
                <div class="admin-form">
                    <h3 id="exp-form-title">+ Add Experience</h3>
                    <input type="hidden" id="exp-edit-id">
                    <div class="form-group">
                        <label>Role / Title</label>
                        <input type="text" id="exp-role" class="pixel-input" placeholder="Squad Leader">
                    </div>
                    <div class="form-group">
                        <label>Company / Organization</label>
                        <input type="text" id="exp-company" class="pixel-input" placeholder="Republic of Korea Army">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="exp-location" class="pixel-input" placeholder="Gangwon-do, South Korea">
                    </div>
                    <div class="form-group">
                        <label>Date Range</label>
                        <input type="text" id="exp-date" class="pixel-input" placeholder="July 2023 – Jan 2025">
                    </div>
                    <div class="form-group">
                        <label>Achievements (one per line)</label>
                        <textarea id="exp-achievements" class="pixel-input" rows="5" placeholder="Line 1&#10;Line 2&#10;Line 3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Order (number for sorting)</label>
                        <input type="number" id="exp-order" class="pixel-input" placeholder="0" value="0">
                    </div>
                    <div class="form-actions">
                        <button id="exp-save-btn" class="pixel-btn">Save</button>
                        <button id="exp-cancel-btn" class="pixel-btn secondary" style="display:none;">Cancel</button>
                    </div>
                </div>
                <h3 class="admin-section-title">Existing Experience</h3>
                <div id="exp-list"></div>
            </div>

            <!-- ===== SKILLS TAB ===== -->
            <div id="skills-tab" class="tab-content">
                <div class="admin-form">
                    <h3 id="skill-form-title">+ Add Skill Category</h3>
                    <input type="hidden" id="skill-edit-id">
                    <div class="form-group">
                        <label>Category Name (Level 1)</label>
                        <input type="text" id="skill-category" class="pixel-input" placeholder="Programming Languages">
                    </div>
                    <div class="form-group">
                        <label>Skills & Descriptions (One per line format: Skill Name | Description)</label>
                        <textarea id="skill-items" class="pixel-input" rows="5" placeholder="C++ | High-performance graphics programming&#10;Unity | Technical art and tool development"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Order (number for sorting)</label>
                        <input type="number" id="skill-order" class="pixel-input" placeholder="0" value="0">
                    </div>
                    <div class="form-actions">
                        <button id="skill-save-btn" class="pixel-btn">Save</button>
                        <button id="skill-cancel-btn" class="pixel-btn secondary" style="display:none;">Cancel</button>
                    </div>
                </div>
                <h3 class="admin-section-title">Existing Skills</h3>
                <div id="skill-list"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script type="module" src="admin.js"></script>
    <script>
        const starsContainer = document.getElementById('stars-bg');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 3) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
