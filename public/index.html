<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Jaeshin Jung — Computer Science @ Texas A&M | Aspiring Game Developer. Portfolio showcasing C++, Unity, and game development projects.">
    <title>Jaeshin Jung | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Pixel Stars Background -->
    <div class="stars" id="stars-bg"></div>

    <nav>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="skills-awards.html">Skills</a></li>
        </ul>
    </nav>

    <div class="container main-hero">

        <!-- Character Select Frame -->
        <div class="avatar-frame">
            <div class="avatar-frame-label">- Select Player -</div>
            <img src="assets/avatar.png" alt="Jaeshin Jung — Pixel Avatar" class="profile-img" id="home-img">
            <div class="avatar-frame-name">Player 1</div>
        </div>

        <h1 id="home-title">Loading...</h1>
        <p class="subtitle" id="home-subtitle">Loading...</p>

        <div class="bio" id="home-about">
            <p>Loading...</p>
        </div>

        <div class="contact-links">
            <a href="https://mail.google.com/mail/?view=cm&to=jjshin2001@gmail.com" target="_blank"><i
                    class="fas fa-envelope"></i> Email</a>
            <a href="https://www.linkedin.com/in/jaeshin-jung-21a3a4341/" target="_blank"><i
                    class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://github.com/JaeshinJung" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        </div>
    </div>

    <script>
        // Generate random pixel stars
        const starsContainer = document.getElementById('stars-bg');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 3) + 's';
            starsContainer.appendChild(star);
        }
    </script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const homeDoc = await getDoc(doc(db, 'siteContent', 'home'));
                if (homeDoc.exists()) {
                    const data = homeDoc.data();
                    if (data.profileImageUrl) document.getElementById('home-img').src = data.profileImageUrl;
                    if (data.heroTitle) document.getElementById('home-title').textContent = data.heroTitle;
                    if (data.heroSubtitle) document.getElementById('home-subtitle').textContent = data.heroSubtitle;
                    
                    // Replace newlines with <br> to preserve typical multiline text
                    if (data.aboutMeText) {
                        const formattedText = data.aboutMeText.replace(/\n/g, '<br>');
                        document.getElementById('home-about').innerHTML = `<p>${formattedText}</p>`;
                    }
                } else {
                    document.getElementById('home-title').textContent = 'Jaeshin Jung';
                    document.getElementById('home-subtitle').textContent = 'Computer Science @ Texas A&M University';
                    document.getElementById('home-about').innerHTML = '<p>Computer Science major with a minor...</p>';
                }
            } catch (e) {
                console.error("Error loading home:", e);
                document.getElementById('home-title').textContent = 'Error Loading Data';
            }
        });
    </script>
</body>

</html>
