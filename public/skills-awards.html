<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Technical skills and academic honors of Jaeshin Jung.">
    <title>Skills & Awards | Jaeshin Jung</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars" id="stars-bg"></div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="skills-awards.html" class="active">Skills</a></li>
        </ul>
    </nav>

    <div class="container">
        <section>
            <h2>Technical Skills</h2>
            <div id="skills-container" class="skills-grid">
                <h3 class="loading-text" style="grid-column: 1 / -1;">Loading Skills Data...</h3>
            </div>
        </section>

        <section style="margin-top: 40px;">
            <h2>Honors & Awards</h2>
            <ul class="award-list">
                <li><strong>Dean's Honor Roll</strong> — Texas A&M Engineering (Fall 2025)</li>
                <li><strong>3rd Place</strong> — 2019 KSEA National Math Competition</li>
                <li><strong>Junior Leadership Award</strong> — NAKS (2020)</li>
            </ul>
        </section>
    </div>

    <script>
        // Generate random pixel stars
        const starsContainer = document.getElementById('stars-bg');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 3) + 's';
            starsContainer.appendChild(star);
        }
    </script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('skills-container');
            function esc(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            try {
                const q = query(collection(db, 'skills'), orderBy('order', 'asc'));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    container.innerHTML = '<p>No technical skills entries yet.</p>';
                } else {
                    container.innerHTML = '';
                    snap.forEach(docSnap => {
                        const d = docSnap.data();
                        const itemsStr = d.items || '';
                        
                        // Parse multiline string or fallback to comma-split
                        let itemsList = [];
                        if (itemsStr.includes('|') || itemsStr.includes('\n')) {
                            // modern format: Skill | Description
                            itemsList = itemsStr.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
                                const parts = line.split('|');
                                return {
                                    name: parts[0] ? parts[0].trim() : '',
                                    desc: parts.length > 1 ? parts.slice(1).join('|').trim() : ''
                                };
                            });
                        } else {
                            // legacy comma format
                            itemsList = itemsStr.split(',').map(s => s.trim()).filter(Boolean).map(name => ({
                                name: name, desc: ''
                            }));
                        }

                        const cardsHtml = itemsList
                            .map(item => `
                                <div class="skill-level-card">
                                    <div class="skill-name">${esc(item.name)}</div>
                                    ${item.desc ? `<div class="skill-desc">${esc(item.desc)}</div>` : ''}
                                </div>
                            `)
                            .join('');

                        container.innerHTML += `
                            <div class="level-1-section">
                                <h2 class="level-1-header">${esc(d.category || 'Untitled')}</h2>
                                <div class="level-2-grid">${cardsHtml}</div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                console.error("Error loading skills:", e);
                container.innerHTML = '<p>Error loading skills data.</p>';
            }
        });
    </script>
</body>

</html>
